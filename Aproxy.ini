; ====== 0. 局域网与去广告 (绝对优先) ======
; 拦截广告与处理本地回环，雷打不动
ruleset=💧 RJ,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Adobe/Adobe.list
ruleset=💧 RJ,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/AdobeActivation/AdobeActivation.list
ruleset=➡️ 国内,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Lan/Lan.list

; ====== 1. AI 优先策略 (防止被后面的 Google 规则抢走) ======
; 【关键】必须放在所有 Google/代理规则之前！
; 这样 Gemini (google.com 的子集) 会先被这里捕获，走 AI 节点。
; 剩下的普通 Google 流量才会继续往下流。
ruleset=👽 AI,https://raw.githubusercontent.com/pk32651/rule/refs/heads/main/AI.list
; 建议补充 Gemini 官方规则，确保你的 AI.list 没漏掉
ruleset=👽 AI,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Gemini/Gemini.list

; ====== 2. 国内下载直连 (必须在补丁之后) ======
; 此时，Steam 的联机域名已经被上面的 Aproxy 抢走了
; 剩下的都是纯下载流量，放心直连，不会卡顿
ruleset=➡️ 国内,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/SteamCN/SteamCN.list
ruleset=➡️ 国内,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Game/GameDownloadCN/GameDownloadCN.list

; ====== 3. 专用 APP 分流 ======
ruleset=👯‍♂️ TikTok,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/TikTok/TikTok.list
ruleset=🙋 Telegram,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Telegram/Telegram.list
ruleset=📀 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/YouTube/YouTube.list
ruleset=📀 音乐,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Spotify/Spotify.list

; ====== 4. 强制代理补丁 (Aproxy) ======
; 这里是你定义的 Aproxy.list (包含 Steam 修复 )
; 指向 🎮 Game 是合理的，因为 Steam 需要低延迟，Google Play 用游戏节点下载也没问题 (速度通常很快)
ruleset=🎮 Game,https://raw.githubusercontent.com/pk32651/rule/refs/heads/main/Aproxy.list

; ====== 5. 游戏平台规则 ======
; 常规的商店和社区规则
ruleset=🎮 Game,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Rockstar/Rockstar.list
ruleset=🎮 Game,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Blizzard/Blizzard.list
ruleset=🎮 Game,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/EA/EA.list

; ====== 6. 剩余的 Google 与 Github ======
; 已经被 AI 规则筛选过的 Google 流量，剩下的(搜索/地图/云盘)走普通国外节点
ruleset=🌍 国外,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Google/Google.list
ruleset=📘 GitHub,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/GitHub/GitHub.list

; ====== 7. 国内直连白名单 (兜底国内) ======
; 你的自定义直连列表 (确保里面没有 google 域名，否则会把上面的规则短路)
ruleset=➡️ 国内,https://raw.githubusercontent.com/pk32651/rule/refs/heads/main/ADirect.list?v=123.list
; 13万条国内域名
ruleset=➡️ 国内,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/ChinaMax/ChinaMax.list

; ====== 8. 防泄露与最终兜底 ======
; IP 规则放在最后，防止误伤
ruleset=➡️ 国内,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/ChinaIPs/ChinaIPs.list
; 全网兜底
ruleset=🌍 国外,[]FINAL

