;3、节点组

; ====== 新增：按订阅来源 GROUPID 拆分 ======
; 这是本版核心。
;
; 订阅合并顺序必须固定：
; 旧纯净台湾订阅|新高速订阅
;
; 对应关系：
; !!GROUPID=0 = 第 1 条订阅 = 旧纯净供应商
; !!GROUPID=1 = 第 2 条订阅 = 新高速供应商
;
; 优点：
; 不再依赖节点名里的供应商关键词。
; 即使两个供应商的节点都叫“台湾 01”，也能按订阅来源精确拆分。

; ====== 旧纯净供应商：只取第 1 条订阅里的台湾节点 ======

custom_proxy_group=台湾-旧纯净-自动`url-test`!!GROUPID=0!!^(?!.*游戏).*(广台|台湾|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan).*`http://www.gstatic.com/generate_204`300,5,150

custom_proxy_group=台湾-旧纯净-手动`select`!!GROUPID=0!!^(?!.*游戏).*(广台|台湾|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan).*

; ====== 新高速供应商：取第 2 条订阅里的节点 ======
; 新高速-自动：第 2 条订阅里的全部非游戏节点，适合日常高速用途。
; 新高速-台湾-自动：第 2 条订阅里的台湾节点，作为需要台湾但不要求最高纯净度时的备用。

custom_proxy_group=新高速-自动`url-test`!!GROUPID=1!!^(?!.*游戏).*`http://www.gstatic.com/generate_204`300,5,150

custom_proxy_group=新高速-手动`select`!!GROUPID=1!!^(?!.*游戏).*

custom_proxy_group=新高速-台湾-自动`url-test`!!GROUPID=1!!^(?!.*游戏).*(广台|台湾|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan).*`http://www.gstatic.com/generate_204`300,5,150

custom_proxy_group=新高速-台湾-手动`select`!!GROUPID=1!!^(?!.*游戏).*(广台|台湾|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan).*

