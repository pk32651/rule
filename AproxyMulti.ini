; ====== 3. 新台湾 IEPL 节点 ======
; 需要台湾地区但不要求最高纯净度时使用。
; 匹配：台湾 + IEPL。

custom_proxy_group=台湾高速-自动`url-test`^(?!.*游戏)(?=.*(IEPL|iepl))(?=.*(广台|台湾|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan)).*`http://www.gstatic.com/generate_204`300,5,150

custom_proxy_group=台湾高速-手动`select`^(?!.*游戏)(?=.*(IEPL|iepl))(?=.*(广台|台湾|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan)).*

