; ====== 2. 新香港 IEPL 节点 ======
; 你的日常高速第一优先。
; 匹配：香港 + IEPL。

custom_proxy_group=香港IEPL-自动`url-test`^(?!.*游戏)(?=.*(IEPL|iepl))(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*`http://www.gstatic.com/generate_204`300,5,150

