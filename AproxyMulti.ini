;3、节点组

; ====== 新增：三条核心线路筛选 ======
; 本版不使用 !!GROUPID。
; 依靠节点名正则筛选，适合 OpenClash 内同时启用两个分开的订阅。

; ====== 1. 旧台湾纯净节点 ======
; 默认逻辑：
; 匹配台湾节点，但排除 IEPL。
; 适合你的“旧台湾纯净线路”。
;
; 如果旧台湾纯净节点名有固定供应商关键词，建议以后改成更精确：
; 例如：
; custom_proxy_group=台湾-旧纯净-自动`url-test`^(?!.*游戏)(?=.*(旧供应商名|Pure|稳定))(?=.*(台湾|TW|TaiWan|🇹🇼)).*`http://www.gstatic.com/generate_204`300,5,150

custom_proxy_group=台湾-旧纯净-自动`url-test`^(?!.*游戏)(?!.*(IEPL|iepl))(?=.*(广台|台湾|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan)).*`http://www.gstatic.com/generate_204`300,5,150

